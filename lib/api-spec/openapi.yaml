openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: chat
    description: Chat operations
  - name: credentials
    description: Credential management operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register
      description: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      description: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      description: Returns the currently authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chat:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a chat message
      description: Send a message and receive a response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
  /credentials:
    get:
      operationId: listCredentials
      tags: [credentials]
      summary: List connected services
      description: Returns all connected service providers for the current user
      responses:
        "200":
          description: List of connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /credentials/{provider}:
    post:
      operationId: saveCredentials
      tags: [credentials]
      summary: Save service credentials
      description: Save or update credentials for a service provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [jira, zoho, sts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCredentialsRequest"
      responses:
        "200":
          description: Credentials saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialActionResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCredentials
      tags: [credentials]
      summary: Remove service credentials
      description: Remove credentials for a service provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [jira, zoho, sts]
      responses:
        "200":
          description: Credentials removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialActionResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
      required:
        - email
        - password
        - name
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
      required:
        - token
        - user
    UserInfo:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
      required:
        - email
        - name
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ChatRequest:
      type: object
      properties:
        message:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatHistoryEntry"
      required:
        - message
    ChatHistoryEntry:
      type: object
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
      required:
        - role
        - content
    ToolCommand:
      type: object
      properties:
        tool:
          type: string
        query:
          type: string
      required:
        - tool
        - query
    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        timestamp:
          type: string
        toolCommand:
          $ref: "#/components/schemas/ToolCommand"
      required:
        - reply
        - timestamp
    ConnectionInfo:
      type: object
      properties:
        provider:
          type: string
        instanceUrl:
          type: string
          nullable: true
        connected:
          type: boolean
        connectedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - provider
        - connected
    ConnectionsResponse:
      type: object
      properties:
        connections:
          type: array
          items:
            $ref: "#/components/schemas/ConnectionInfo"
      required:
        - connections
    SaveCredentialsRequest:
      type: object
      properties:
        credentials:
          type: object
        instanceUrl:
          type: string
      required:
        - credentials
    CredentialActionResponse:
      type: object
      properties:
        success:
          type: boolean
        provider:
          type: string
        connected:
          type: boolean
      required:
        - success
        - provider
        - connected
